
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # container_name: laravel_app
    working_dir: /var/www
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DATABASE:-laravel}
      DB_USERNAME: ${POSTGRES_USERNAME:-laravel}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    # volumes:
    #   - app_data:/var/www
   # ports:
   #   - 9000:9000  ← можно удалить
    depends_on:
      - db
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  webserver:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - 8010:80
    volumes:
      # - app_data:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./src:/var/www
    depends_on:
      - app

  db:
    image: postgres:17
    # container_name: postgres_db_bank_analyser
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-laravel}
      POSTGRES_USER: ${POSTGRES_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT:-5543}:5432
volumes:
  db_data:
  # app_data:
